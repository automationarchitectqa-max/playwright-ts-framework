name: PW-TS Framework CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, prod]
      tag:
        description: 'Test tag filter (smoke / regression / api / ui)'
        required: false
        default: 'smoke'
      workers:
        description: 'Number of parallel workers'
        required: false
        default: '4'
      project:
        description: 'Project (api / ui / e2e / all)'
        required: false
        default: 'all'

env:
  ENV: ${{ github.event.inputs.env || 'dev' }}
  TAG: ${{ github.event.inputs.tag || 'smoke' }}
  WORKERS: ${{ github.event.inputs.workers || '4' }}
  CI: 'true'

jobs:
  test:
    name: Run Tests (${{ github.event.inputs.project || 'all' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: TypeCheck
        run: npm run typecheck

      - name: Run Tests
        run: |
          PROJECT="${{ github.event.inputs.project || 'all' }}"
          if [ "$PROJECT" = "all" ]; then
            PROJECT_FLAG=""
          else
            PROJECT_FLAG="--project=$PROJECT"
          fi

          TAG_FLAG=""
          if [ -n "$TAG" ]; then
            TAG_FLAG="--grep @$TAG"
          fi

          npx playwright test $PROJECT_FLAG $TAG_FLAG --workers=$WORKERS

      - name: Upload Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: reports/html/
          retention-days: 30

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: reports/allure-results/
          retention-days: 30

      - name: Upload Test Results (JUnit)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-results
          path: reports/junit/
          retention-days: 30

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Playwright Test Results
          path: reports/junit/results.xml
          reporter: java-junit
